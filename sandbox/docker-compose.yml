# ============================================================
# KILL SWITCH: docker compose -f D:\Lionguard\sandbox\docker-compose.yml down -v --rmi all
# This removes containers, volumes, networks, and images. Gone.
# ============================================================

services:
  openclaw-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lionguard_openclaw_sandbox
    networks:
      - lionguard_isolated
    volumes:
      - sandbox_data:/app/data
      - ../lionguard:/app/lionguard_src:ro
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - OLLAMA_HOST=host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

networks:
  lionguard_isolated:
    driver: bridge

volumes:
  sandbox_data:
    driver: local
